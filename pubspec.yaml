name: orbit
description: 跨平台课表提醒应用，支援 Windows 與 Android。
publish_to: 'none'
version: 1.1.0+5

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.5
  path_provider: ^2.1.5
  path: ^1.9.1
  excel: ^4.0.6
  flutter_local_notifications: ^19.0.0
  android_alarm_manager_plus: ^4.0.5
  file_picker: ^8.3.7
  timezone: ^0.10.0
  flutter_timezone: ^4.1.0
  shared_preferences: ^2.5.3
  intl: ^0.20.2
  window_manager: ^0.4.3
  tray_manager: ^0.5.2
  android_intent_plus: ^5.3.0
  launch_at_startup: ^0.3.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: icon.png
  windows:
    generate: true
    image_path: icon.png
    icon_size: 256

# 使用系统自带的 SQLite，避免 flutter test / build 时从 GitHub 下载预编译库（国内网络易卡住）。
hooks:
  user_defines:
    sqlite3:
      source: system
      name_windows: winsqlite3
      name: sqlite3

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icons/
